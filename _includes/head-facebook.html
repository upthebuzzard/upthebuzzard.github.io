<meta property="og:type"        content="article" />
<meta property="og:title"       content="{{ page.title | default: site.title | escape | strip_html | normalize_whitespace | escape }}" />
<meta property="og:description" content="{{ page.excerpt | default: site.description | markdownify | strip_html | normalize_whitespace | escape }}" />
<meta property="og:url"         content="{{ page.url | replace:'index.html','' | absolute_url }}" />
{% if page.date %}<meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}" />
{% endif %}
<meta property="article:author" content="{{ site.author }}" />
{% include resolve-background-image.html %}
{% assign og_image = page.cover_image | default: background_image_url %}
{% if og_image %}
<meta property="og:image"       content="{{ og_image | absolute_url }}" />
{% endif %}
